<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zalopay CS Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 820px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
    box-shadow: 0 0 40px rgba(0,0,0,0.12);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #00B14F 0%, #007a36 100%);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-info h1 { font-size: 16px; font-weight: 600; }
  .header-info p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn-new {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  .btn-new:hover { background: rgba(255,255,255,0.35); }

  /* Session badge */
  .session-bar {
    background: #f7f9fc;
    border-bottom: 1px solid #e8edf2;
    padding: 6px 20px;
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .session-id { font-family: monospace; color: #0068FF; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg { display: flex; gap: 10px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.ai .avatar   { background: #e8f7ef; }
  .msg.user .avatar { background: #00B14F; color: #fff; }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg.ai   .bubble { background: #f0faf4; border-top-left-radius: 4px; color: #1a1a2e; }
  .msg.user .bubble { background: #00B14F; border-top-right-radius: 4px; color: #fff; }

  /* Markdown inside bubble */
  .bubble h3 { font-size: 14px; margin: 8px 0 4px; }
  .bubble p  { margin: 4px 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
  .bubble li { margin: 2px 0; }
  .bubble code {
    background: rgba(0,0,0,0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }
  .bubble pre {
    background: rgba(0,0,0,0.06);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 6px 0;
    font-size: 13px;
    white-space: pre-wrap;
  }
  .bubble strong { font-weight: 600; }
  .bubble hr { border: none; border-top: 1px solid rgba(0,0,0,0.1); margin: 8px 0; }
  .bubble table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 13px; }
  .bubble th, .bubble td { border: 1px solid #c8e6d4; padding: 5px 8px; text-align: left; }
  .bubble th { background: rgba(0,177,79,0.08); }
  .msg.user .bubble code { background: rgba(255,255,255,0.2); }
  .msg.user .bubble pre  { background: rgba(255,255,255,0.15); }

  .timestamp {
    font-size: 11px;
    color: #aaa;
    margin-top: 4px;
    text-align: right;
  }
  .msg.ai .timestamp { text-align: left; }

  /* Typing indicator */
  .typing .bubble {
    padding: 12px 16px;
    display: flex; align-items: center; gap: 5px;
  }
  .dot {
    width: 7px; height: 7px;
    background: #00B14F;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 14px 16px;
    border-top: 1px solid #e8edf2;
    background: #fff;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  textarea {
    flex: 1;
    border: 1.5px solid #d0d8e8;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 140px;
    min-height: 42px;
    line-height: 1.5;
    transition: border 0.2s;
  }
  textarea:focus { border-color: #00B14F; }
  textarea::placeholder { color: #b0b8c8; }

  .btn-send {
    width: 42px; height: 42px;
    background: #00B14F;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-send:hover  { background: #009140; }
  .btn-send:active { transform: scale(0.93); }
  .btn-send:disabled { background: #99d4b8; cursor: not-allowed; }
  .btn-send svg { width: 18px; height: 18px; fill: #fff; }

  /* Error message */
  .error-bubble {
    background: #fff0f0 !important;
    border: 1px solid #ffd0d0;
    color: #cc3333 !important;
  }

  /* Quick prompts */
  .quick-prompts {
    padding: 6px 20px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    border-top: 1px solid #f0f4f8;
    min-height: 38px;
  }
  .chip {
    background: #f0faf4;
    border: 1px solid #b3e6c8;
    color: #00874a;
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chip:hover { background: #d0f0e0; border-color: #00B14F; }

  /* Scrollbar */
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: #c8e6d4; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">💬</div>
    <div class="header-info">
      <h1>Zalopay CS Promotion Assistant</h1>
      <p>AI hỗ trợ xử lý ticket chương trình khuyến mãi</p>
    </div>
    <div class="header-actions">
      <button class="btn-new" onclick="newSession()">🔄 Cuộc hội thoại mới</button>
    </div>
  </div>

  <!-- Session bar -->
  <div class="session-bar">
    🔑 Session: <span class="session-id" id="sessionId"></span>
    <span id="statusDot" style="margin-left:auto; display:flex; align-items:center; gap:4px;">
      <span style="width:7px;height:7px;background:#22c55e;border-radius:50%;display:inline-block"></span>
      <span style="font-size:12px;color:#555">Agent đang hoạt động</span>
    </span>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Quick prompts (shown only at start, populated dynamically) -->
  <div class="quick-prompts" id="quickPrompts"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="input" placeholder="Mô tả vấn đề khách hàng... (Shift+Enter xuống dòng)" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Gửi">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const ENDPOINT = "";

let sessionId = "";
let isLoading = false;

// ── Chip defaults (fallback khi chưa có recent data) ─────────
const DEFAULT_CHIPS = [
  { label: '🛒 ZLPMUASAM - không được giảm giá',
    text: 'Khách mua Go! App đơn 850.000đ, nhập mã ZLPMUASAM nhưng không được giảm giá. Giao dịch ngày hôm nay.' },
  { label: '🎮 GAMEVERSE - chưa nhận mã dự thưởng',
    text: 'Khách thanh toán game qua ZaloPay 60.000đ nhưng chưa nhận được mã dự thưởng GAMEVERSE.' },
  { label: '💰 CASHBACK - chưa nhận tiền hoàn',
    text: 'Khách thanh toán hóa đơn điện 350.000đ bằng ví ZaloPay nhưng sau 24h vẫn chưa nhận được tiền hoàn.' },
];

// ── Init ─────────────────────────────────────────────────────
function generateId() {
  return 'cs-' + Math.random().toString(36).slice(2, 10);
}

async function loadRecentChips() {
  const container = document.getElementById('quickPrompts');
  container.innerHTML = '';

  let recents = [];
  try {
    const res = await fetch('/api/recent');
    if (res.ok) recents = await res.json();
  } catch (_) {}

  const chips = recents.length > 0
    ? recents.map(r => ({
        label: `🕐 ${r.mkt_code}${r.name ? ' — ' + r.name : ''}`,
        text: `Khách gặp vấn đề với CTKM ${r.mkt_code}${r.name ? ' (' + r.name + ')' : ''}. `,
        meta: r.period ? r.period : ''
      }))
    : DEFAULT_CHIPS;

  chips.forEach(chip => {
    const el = document.createElement('span');
    el.className = 'chip';
    el.title = chip.meta || chip.text;
    el.textContent = chip.label;
    el.onclick = () => {
      document.getElementById('input').value = chip.text;
      autoResize(document.getElementById('input'));
      document.getElementById('input').focus();
    };
    container.appendChild(el);
  });

  // Label nhỏ phía trước nếu có recent data
  if (recents.length > 0) {
    const label = document.createElement('span');
    label.style.cssText = 'font-size:11px;color:#888;align-self:center;white-space:nowrap;margin-right:4px;';
    label.textContent = '🕐 Tra cứu gần đây:';
    container.insertBefore(label, container.firstChild);
  }
}

async function initSession() {
  sessionId = generateId();
  document.getElementById('sessionId').textContent = sessionId;
  document.getElementById('messages').innerHTML = '';
  addMessage('ai', `Xin chào! 👋 Tôi là **AI Promotion Assistant** của Zalopay.\n\nHãy mô tả vấn đề khách hàng đang gặp phải (tên CTKM, ngày giao dịch, triệu chứng) để tôi hỗ trợ bạn xử lý ticket.`);
  document.getElementById('quickPrompts').style.display = 'flex';
  await loadRecentChips();
}

// ── Message rendering ─────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(role, text) {
  const wrap = document.getElementById('messages');

  // Hide quick prompts after first user message
  if (role === 'user') {
    document.getElementById('quickPrompts').style.display = 'none';
  }

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'ai' ? '🤖' : '👤';

  const content = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'ai') {
    bubble.innerHTML = marked.parse(text || '');
  } else {
    bubble.textContent = text;
  }

  const ts = document.createElement('div');
  ts.className = 'timestamp';
  ts.textContent = now();

  content.appendChild(bubble);
  content.appendChild(ts);
  msg.appendChild(avatar);
  msg.appendChild(content);
  wrap.appendChild(msg);
  wrap.scrollTop = wrap.scrollHeight;
  return msg;
}

function addTyping() {
  const wrap = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = 'msg ai typing';
  msg.id = 'typing-indicator';
  msg.innerHTML = `
    <div class="avatar">🤖</div>
    <div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  wrap.appendChild(msg);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── Send ──────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addMessage('user', text);
  setLoading(true);
  addTyping();

  try {
    const res = await fetch(`${ENDPOINT}/api/invocations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId })
    });

    const data = await res.json();
    removeTyping();

    if (data.response) {
      addMessage('ai', data.response);
    } else if (data.error) {
      const errMsg = document.createElement('div');
      errMsg.className = 'msg ai';
      errMsg.innerHTML = `<div class="avatar">🤖</div><div><div class="bubble error-bubble">⚠️ Lỗi: ${data.error}</div></div>`;
      document.getElementById('messages').appendChild(errMsg);
    } else {
      addMessage('ai', JSON.stringify(data, null, 2));
    }
  } catch (err) {
    removeTyping();
    const wrap = document.getElementById('messages');
    const errEl = document.createElement('div');
    errEl.className = 'msg ai';
    errEl.innerHTML = `<div class="avatar">🤖</div><div><div class="bubble error-bubble">⚠️ Không kết nối được đến agent. Kiểm tra network và CORS.<br><small>${err.message}</small></div></div>`;
    wrap.appendChild(errEl);
    wrap.scrollTop = wrap.scrollHeight;
  } finally {
    setLoading(false);
  }
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('input').disabled = v;
}

// ── Helpers ───────────────────────────────────────────────────
function newSession() {
  if (isLoading) return;
  initSession();
  document.getElementById('input').focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── Start ─────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });
initSession().then(() => document.getElementById('input').focus());
</script>
</body>
</html>
