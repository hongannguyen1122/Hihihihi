<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZaloPay CS Promotion Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #0068FF;
      --blue-dark:  #0052cc;
      --blue-light: #e8f0fe;
      --green:      #52c41a;
      --red:        #ff4d4f;
      --gray-1:     #f5f5f5;
      --gray-2:     #e8e8e8;
      --gray-3:     #999;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #eef2f7; }

    #app {
      height: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: white;
      box-shadow: 0 0 24px rgba(0,0,0,0.08);
    }

    /* ── Header ── */
    .header {
      background: var(--blue);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon { width: 36px; height: 36px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p  { font-size: 12px; opacity: 0.85; margin-top: 1px; }
    .btn-new {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-new:hover { background: rgba(255,255,255,0.28); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Messages ── */
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    }
    .avatar.ai   { background: var(--blue);  color: white; }
    .avatar.user { background: var(--green); color: white; }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .bubble.ai   { background: var(--gray-1); border-bottom-left-radius: 4px; }
    .bubble.user { background: var(--blue); color: white; border-bottom-right-radius: 4px; }

    .bubble img.thumb {
      display: block;
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 8px;
      margin-top: 8px;
      cursor: zoom-in;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Markdown in AI bubbles */
    .bubble.ai p            { margin-bottom: 8px; }
    .bubble.ai p:last-child { margin-bottom: 0; }
    .bubble.ai ul, .bubble.ai ol { padding-left: 20px; margin: 4px 0; }
    .bubble.ai li           { margin-bottom: 3px; }
    .bubble.ai code         { background: #e8e8e8; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; font-family: 'SF Mono', Consolas, monospace; }
    .bubble.ai pre          { background: #efefef; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
    .bubble.ai pre code     { background: none; padding: 0; }
    .bubble.ai hr           { border: none; border-top: 1px solid #ddd; margin: 10px 0; }
    .bubble.ai h1, .bubble.ai h2, .bubble.ai h3 { font-size: 14px; font-weight: 700; margin: 8px 0 4px; }
    .bubble.ai strong       { font-weight: 600; }
    .bubble.ai blockquote   { border-left: 3px solid var(--blue); padding-left: 10px; color: #555; margin: 6px 0; }

    /* Loading dots */
    .dots { display: inline-flex; gap: 4px; align-items: center; padding: 2px 0; }
    .dots span { width: 7px; height: 7px; background: var(--gray-3); border-radius: 50%; animation: dot-bounce 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    /* ── Image preview strip ── */
    .preview-strip {
      display: none;
      padding: 6px 16px 4px;
      border-top: 1px solid var(--gray-2);
    }
    .preview-strip.visible { display: flex; align-items: center; gap: 10px; }

    .preview-wrap { position: relative; display: inline-block; }
    .preview-wrap img { height: 68px; border-radius: 8px; border: 2px solid var(--blue); display: block; }
    .preview-remove {
      position: absolute; top: -7px; right: -7px;
      width: 20px; height: 20px;
      background: var(--red); border: 2px solid white; border-radius: 50%;
      cursor: pointer; color: white; font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-label { font-size: 12px; color: var(--gray-3); }

    /* ── Input bar ── */
    .input-bar { border-top: 1px solid var(--gray-2); padding: 12px 16px; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    .btn-attach {
      width: 38px; height: 38px;
      border: 1px solid var(--gray-2);
      background: white; border-radius: 50%;
      cursor: pointer; font-size: 17px; color: #555;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-attach:hover          { border-color: var(--blue); background: var(--blue-light); }
    .btn-attach.active         { border-color: var(--blue); background: var(--blue-light); }

    #msgInput {
      flex: 1;
      border: 1px solid var(--gray-2);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 38px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      overflow-y: auto;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: var(--blue); }
    #msgInput::placeholder { color: var(--gray-3); }

    .btn-send {
      width: 38px; height: 38px;
      background: var(--blue); border: none; border-radius: 50%;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-send:hover:not(:disabled) { background: var(--blue-dark); }
    .btn-send:disabled { opacity: 0.35; cursor: default; }
    .btn-send svg { width: 18px; height: 18px; fill: white; }

    .input-hint { font-size: 11px; color: var(--gray-3); margin-top: 6px; padding-left: 2px; }

    /* ── Drag-over overlay ── */
    #app.drag-over::after {
      content: "Thả ảnh vào đây";
      position: fixed; inset: 0;
      background: rgba(0,104,255,0.12);
      border: 3px dashed var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--blue); font-weight: 600;
      pointer-events: none; z-index: 10;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; object-fit: contain; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">💙</div>
      <div>
        <h1>ZaloPay CS Promotion Assistant</h1>
        <p>Xử lý ticket CTKM · Session: <span id="sessionTag">—</span></p>
      </div>
    </div>
    <button class="btn-new" onclick="newSession()">🔄 Session mới</button>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Image preview strip -->
  <div class="preview-strip" id="previewStrip">
    <div class="preview-wrap">
      <img id="previewImg" src="" alt="">
      <div class="preview-remove" onclick="removeImage()" title="Xóa ảnh">×</div>
    </div>
    <div class="preview-label">📎 Screenshot sẽ được gửi kèm</div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-row">
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <button class="btn-attach" id="btnAttach" title="Đính kèm ảnh (hoặc Ctrl+V paste, kéo thả)">📎</button>
      <textarea id="msgInput"
        placeholder="Mô tả vấn đề của khách... (Enter gửi · Shift+Enter xuống dòng)"
        rows="1"></textarea>
      <button class="btn-send" id="btnSend" title="Gửi (Enter)">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">📎 Đính kèm · Ctrl+V Paste ảnh · Kéo thả ảnh vào cửa sổ · Shift+Enter xuống dòng</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API_URL = '/invocations';

marked.use({ breaks: true, gfm: true });

// ── State ─────────────────────────────────────────────────────────────────────
let sessionId  = '';
let pendingImg = null; // { dataUrl: string }
let sending    = false;

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(function init() {
  sessionId = localStorage.getItem('zp_cs_session') || makeSession();
  updateSessionTag();
  appendWelcome();

  // File picker
  const fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value = ''; });
  document.getElementById('btnAttach').addEventListener('click', () => fileInput.click());

  // Textarea
  const ta = document.getElementById('msgInput');
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  ta.addEventListener('input',   () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; });
  ta.addEventListener('paste',   onPaste);

  // Send button
  document.getElementById('btnSend').addEventListener('click', doSend);

  // Drag-drop on #app
  const app = document.getElementById('app');
  app.addEventListener('dragover',  e => { e.preventDefault(); app.classList.add('drag-over'); });
  app.addEventListener('dragleave', e => { if (!app.contains(e.relatedTarget)) app.classList.remove('drag-over'); });
  app.addEventListener('drop', e => {
    e.preventDefault(); app.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  // Escape closes lightbox
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  ta.focus();
})();

// ── Session ───────────────────────────────────────────────────────────────────
function makeSession() {
  const id = 'cs-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  localStorage.setItem('zp_cs_session', id);
  return id;
}
function updateSessionTag() {
  document.getElementById('sessionTag').textContent = sessionId.slice(-8);
}
function newSession() {
  if (sending) return;
  sessionId = makeSession();
  updateSessionTag();
  document.getElementById('chatArea').innerHTML = '';
  removeImage();
  appendWelcome();
  document.getElementById('msgInput').focus();
}

// ── Image ─────────────────────────────────────────────────────────────────────
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => setImage(e.target.result);
  reader.readAsDataURL(file);
}

function onPaste(e) {
  const items = e.clipboardData?.items || [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      loadFile(item.getAsFile());
      return;
    }
  }
}

function setImage(dataUrl) {
  pendingImg = { dataUrl };
  document.getElementById('previewImg').src = dataUrl;
  document.getElementById('previewStrip').classList.add('visible');
  document.getElementById('btnAttach').classList.add('active');
}

function removeImage() {
  pendingImg = null;
  document.getElementById('previewImg').src = '';
  document.getElementById('previewStrip').classList.remove('visible');
  document.getElementById('btnAttach').classList.remove('active');
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function doSend() {
  if (sending) return;

  const ta    = document.getElementById('msgInput');
  const text  = ta.value.trim();
  const image = pendingImg; // snapshot before clearing

  if (!text && !image) return;

  // Render user bubble
  appendUserBubble(text, image?.dataUrl ?? null);

  // Clear inputs
  ta.value = '';
  ta.style.height = 'auto';
  removeImage();

  // Build payload — send full data URL so backend preserves mime type
  const payload = { message: text, session_id: sessionId };
  if (image) payload.image = image.dataUrl;

  // Lock UI
  sending = true;
  document.getElementById('btnSend').disabled = true;
  const loadingEl = appendLoadingBubble();

  try {
    const res = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    loadingEl.remove();

    if (!res.ok) {
      const msg = await res.text().catch(() => `HTTP ${res.status}`);
      appendAIBubble(`❌ Lỗi máy chủ (${res.status}): ${msg}`);
      return;
    }

    const data = await res.json();
    appendAIBubble(data.response || '_(Không có phản hồi)_');
  } catch (err) {
    loadingEl.remove();
    appendAIBubble(`❌ Không kết nối được máy chủ: ${err.message}`);
  } finally {
    sending = false;
    document.getElementById('btnSend').disabled = false;
    document.getElementById('msgInput').focus();
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function appendWelcome() {
  appendAIBubble(
    '**Xin chào!** Tôi là ZaloPay CS Promotion Assistant. 👋\n\n' +
    'Hãy mô tả vấn đề của khách hàng liên quan đến chương trình khuyến mãi.\n\n' +
    'Bạn có thể:\n' +
    '- Nhập mô tả bằng văn bản\n' +
    '- **Đính kèm screenshot** từ hệ thống (nút 📎, kéo thả, hoặc Ctrl+V)\n' +
    '- Dùng `/refresh-cache` để cập nhật dữ liệu Google Sheets'
  );
}

function appendUserBubble(text, imageDataUrl) {
  const area = document.getElementById('chatArea');
  const row  = mkEl('div', 'msg user');
  const av   = mkEl('div', 'avatar user'); av.textContent = 'CS';
  const bub  = mkEl('div', 'bubble user');

  if (text) {
    const p = mkEl('p');
    p.style.whiteSpace = 'pre-wrap';
    p.textContent = text;
    bub.appendChild(p);
  }

  if (imageDataUrl) {
    const img = mkEl('img');
    img.src       = imageDataUrl;
    img.className = 'thumb';
    img.alt       = 'Screenshot';
    img.title     = 'Nhấn để phóng to';
    img.addEventListener('click', () => openLightbox(imageDataUrl));
    bub.appendChild(img);
  }

  row.appendChild(av);
  row.appendChild(bub);
  area.appendChild(row);
  scrollBottom();
}

function appendAIBubble(markdown) {
  const area = document.getElementById('chatArea');
  const row  = mkEl('div', 'msg ai');
  const av   = mkEl('div', 'avatar ai'); av.textContent = 'ZP';
  const bub  = mkEl('div', 'bubble ai');
  bub.innerHTML = marked.parse(markdown);
  row.appendChild(av);
  row.appendChild(bub);
  area.appendChild(row);
  scrollBottom();
}

function appendLoadingBubble() {
  const area = document.getElementById('chatArea');
  const row  = mkEl('div', 'msg ai');
  const av   = mkEl('div', 'avatar ai'); av.textContent = 'ZP';
  const bub  = mkEl('div', 'bubble ai');
  bub.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  row.appendChild(av);
  row.appendChild(bub);
  area.appendChild(row);
  scrollBottom();
  return row;
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function mkEl(tag, cls) { const el = document.createElement(tag); if (cls) el.className = cls; return el; }
function scrollBottom()  { const a = document.getElementById('chatArea'); requestAnimationFrame(() => { a.scrollTop = a.scrollHeight; }); }
</script>
</body>
</html>
